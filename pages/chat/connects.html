<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connects — Protocol</title>
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="stylec.css" />
  </head>
  <body>
    <div id="site-nav"></div>

    <div class="layout-container">
      <main class="main-workspace">

        <div id="no-chat-selected" class="chat-empty-state">
          <div class="chat-empty-icon">💬</div>
          <h3>Select a member to start chatting</h3>
          <p>Choose someone from the list on the right.</p>
        </div>

        <div id="active-chat" class="chat-container" style="display:none">
          <div class="chat-header">
            <div class="chat-header-left">
              <div class="chat-header-avatar-wrapper">
                <img
                  id="chat-header-avatar"
                  src="https://ui-avatars.com/api/?name=?&background=aaa&color=fff"
                  alt="Avatar"
                />
                <span class="chat-header-active-dot"></span>
              </div>
              <div class="chat-header-info">
                <h3 id="chat-header-name">—</h3>
                <span id="chat-header-status">Online</span>
              </div>
            </div>
          </div>

          <div class="chat-messages" id="chat-messages-container"></div>

          <div class="chat-input-wrapper">
            <label for="chat-file-input" class="chat-action-icon chat-file-btn" title="Attach file">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
              </svg>
            </label>
            <input type="file" id="chat-file-input" hidden>
            <div class="chat-input-box">
              <input type="text" id="chat-text-input" placeholder="Type a message..." />
            </div>
            <button class="chat-action-icon chat-send-btn" id="chat-send-btn" title="Send">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
              </svg>
            </button>
          </div>
        </div>
      </main>

      <div class="right-sidebar">
        <div id="sidebar-main-view">
          <div class="profile-header">
            <div class="profile-avatar-wrapper">
              <img
                class="profile-avatar"
                  src="https://ui-avatars.com/api/?name=User&background=5b85f6&color=fff"
                  alt="Profile"
              />
              <span class="active-status"></span>
            </div>
              <h2 class="profile-name">—</h2>
              <span class="profile-title">Member</span>
          </div>

          <div class="action-bar">
            <a href="../../pages/premium/premium.html" class="action-btn btn-premium">
              <span class="btn-text">⭐ Premium</span>
            </a>
          </div>

          <div class="messenger-section">
            <div class="section-header">
              <h3>Recent Chats</h3>
            </div>
            <div id="conversation-rows">
              <div style="padding:12px;color:var(--clr-muted);font-size:13px">Loading...</div>
            </div>
          </div>

          <div class="messenger-section">
            <div class="section-header">
              <h3>Thành viên</h3>
              <a href="#" id="btn-view-all-members">Xem tất cả</a>
            </div>
            <div id="member-rows">
              <div style="padding:12px;color:var(--clr-muted);font-size:13px">Đang tải...</div>
            </div>
          </div>

          <div class="messenger-section">
            <div class="section-header">
              <h3>Kết nối Mentor</h3>
              <a href="#" id="btn-view-all-mentors">Xem tất cả</a>
            </div>
            <div id="mentor-rows">
              <div style="padding:12px;color:var(--clr-muted);font-size:13px">Đang tải...</div>
            </div>
            <button class="find-mentor-btn" id="btn-find-mentor">
              Tìm mentor phù hợp
            </button>
          </div>
        </div>

        <div id="sidebar-list-view" style="display: none">
          <div class="list-view-header">
            <svg id="btn-back-sidebar" viewBox="0 0 24 24">
              <path
                d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"
              />
            </svg>
            <h3 id="list-view-title">Danh sách</h3>
          </div>
          <div id="list-view-content" class="messenger-section"></div>
        </div>
      </div>
    </div>

  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/nav.js"></script>
    <script src="navc.js"></script>
  </body>
</html>
