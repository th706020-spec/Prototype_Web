<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connects — Protocol</title>
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="stylec.css" />
  </head>
  <body>
    <div id="site-nav"></div>

    <div class="chat-layout">
      <!-- Mobile: backdrop overlay when a sidebar is open -->
      <div class="chat-sidebar-backdrop" id="chat-sidebar-backdrop"></div>

      <!-- Mobile: peek tabs sticking out from edges -->
      <button class="chat-peek-tab chat-peek-tab-left" id="chat-peek-left" aria-label="Open conversations">
        <span class="chat-peek-icon">💬</span>
        <span class="chat-peek-label">Chats</span>
      </button>
      <button class="chat-peek-tab chat-peek-tab-right" id="chat-peek-right" aria-label="Open members">
        <span class="chat-peek-icon">👥</span>
        <span class="chat-peek-label">Members</span>
      </button>

      <!-- LEFT SIDEBAR: conversation list -->
      <aside class="chat-left-sidebar" id="chat-left-sidebar">
        <div class="chat-left-header">
          <h3>Messages</h3>
          <button class="sidebar-close-btn" id="close-left-sidebar" aria-label="Close">✕</button>
        </div>
        <div id="conversation-list" class="conversation-list">
          <div class="sidebar-loading">Loading...</div>
        </div>
      </aside>

      <!-- CENTER: main chat area -->
      <main class="chat-main">
        <div id="no-chat-selected" class="chat-empty-state">
          <div class="chat-empty-icon">💬</div>
          <h3>Select a conversation</h3>
          <p>Choose someone from the left to start chatting.</p>
        </div>

        <div id="active-chat" class="chat-container" style="display:none">
          <div class="chat-header">
            <div class="chat-header-left">
              <div class="chat-header-avatar-wrapper">
                <img id="chat-header-avatar"
                  src="https://ui-avatars.com/api/?name=?&background=aaa&color=fff"
                  alt="Avatar" />
                <span class="chat-header-active-dot"></span>
              </div>
              <div class="chat-header-info">
                <h3 id="chat-header-name">—</h3>
                <span id="chat-header-status">Online</span>
              </div>
            </div>
          </div>

          <div class="chat-messages" id="chat-messages-container"></div>

          <!-- Upload progress bar (hidden by default) -->
          <div class="chat-upload-progress" id="chat-upload-progress" style="display:none">
            <div class="chat-upload-label" id="chat-upload-label">Uploading…</div>
            <div class="chat-upload-track">
              <div class="chat-upload-fill" id="chat-upload-fill"></div>
            </div>
          </div>

          <div class="chat-input-wrapper">
            <label for="chat-file-input" class="chat-action-icon chat-file-btn" title="Attach file">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
              </svg>
            </label>
            <input type="file" id="chat-file-input" hidden>
            <div class="chat-input-box">
              <input type="text" id="chat-text-input" placeholder="Type a message..." />
            </div>
            <button class="chat-action-icon chat-send-btn" id="chat-send-btn" title="Send">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
              </svg>
            </button>
          </div>
        </div>
      </main>

      <!-- RIGHT SIDEBAR: member list (Discord-style) -->
      <aside class="chat-right-sidebar" id="chat-right-sidebar">
        <div class="chat-right-header">
          <span>Members</span>
          <button class="sidebar-close-btn" id="close-right-sidebar" aria-label="Close">✕</button>
        </div>
        <div class="members-list-container">
          <div id="members-by-role"></div>
        </div>
        <div class="find-mentor-sticky">
          <button class="find-mentor-btn" id="btn-find-mentor">
            🎓 Find a Mentor
          </button>
        </div>
      </aside>
    </div>

  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="navc.js"></script>
  </body>
</html>
