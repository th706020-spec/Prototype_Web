<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connects — Protocol</title>
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="stylec.css" />
  </head>
  <body>
    <div id="site-nav"></div>

    <div class="layout-container">
      <main class="main-workspace">
        <div id="active-chat" class="chat-container">
          <div class="chat-header">
            <div class="chat-header-left">
              <div class="chat-header-avatar-wrapper">
                <img
                  id="chat-header-avatar"
                  src="https://vcdn1-giaitri.vnecdn.net/2026/01/08/james-nhom-cortis-tai-su-kien-dior-1767840271-1767840287-1767841187.jpg?w=460&h=0&q=100&dpr=2&fit=crop&s=3AqqCtG3qbDfymg-qNqUGA"
                  alt="Avatar"
                />
                <span class="chat-header-active-dot"></span>
              </div>
              <div class="chat-header-info">
                <h3 id="chat-header-name">chêm</h3>
                <span id="chat-header-status">Đang hoạt động</span>
              </div>
            </div>
            <div class="chat-header-actions">
              <svg class="chat-action-icon" viewBox="0 0 24 24">
                <path
                  d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1zM19 12h2c0-4.8-3.9-8.7-8.7-8.7v2c3.7 0 6.7 3 6.7 6.7z"
                />
              </svg>
              <svg class="chat-action-icon" viewBox="0 0 24 24">
                <path
                  d="M17 10.5V7c0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1v10c0 .6.4 1 1 1h12c.6 0 1-.4 1-1v-3.5l4 4v-11l-4 4z"
                />
              </svg>
              <svg class="chat-action-icon" viewBox="0 0 24 24">
                <path
                  d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"
                />
              </svg>
            </div>
          </div>

          <div class="chat-messages" id="chat-messages-container"></div>

          <div class="chat-input-wrapper">
            <div class="chat-input-actions-left">
              <svg class="chat-action-icon" viewBox="0 0 24 24">
                <path
                  d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"
                />
              </svg>
              <svg class="chat-action-icon" viewBox="0 0 24 24">
                <path
                  d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"
                />
              </svg>
              <svg class="chat-action-icon" viewBox="0 0 24 24">
                <path
                  d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM8.5 8c.83 0 1.5.67 1.5 1.5S9.33 11 8.5 11 7 10.33 7 9.5 7.67 8 8.5 8zm3.5 9.5c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5zM15.5 11c-.83 0-1.5-.67-1.5-1.5S14.67 8 15.5 8s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"
                />
              </svg>
            </div>
            <div class="chat-input-box">
              <input type="text" placeholder="Aa" />
              <svg class="emoji-btn" viewBox="0 0 24 24">
                <path
                  d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM8.5 8c.83 0 1.5.67 1.5 1.5S9.33 11 8.5 11 7 10.33 7 9.5 7.67 8 8.5 8zm3.5 9.5c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5zM15.5 11c-.83 0-1.5-.67-1.5-1.5S14.67 8 15.5 8s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"
                />
              </svg>
            </div>
            <svg class="chat-action-icon chat-send-btn" viewBox="0 0 24 24">
              <path
                d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"
              />
            </svg>
          </div>
        </div>
      </main>

      <div class="right-sidebar">
        <div id="sidebar-main-view">
          <div class="profile-header">
            <div class="profile-avatar-wrapper">
              <img
                class="profile-avatar"
                src="https://stylerepublik.vn/media/full/2025/10/1760502614_martin_cortis_1757331923_3717092046088439761_36026758022-jpg.jpg"
                alt="Cu bin"
              />
              <span class="active-status"></span>
            </div>
            <h2 class="profile-name">Cu bin</h2>
            <span class="profile-title">idol K-Pop</span>
          </div>

          <div class="action-bar">
            <button class="action-btn btn-premium">
              <span class="btn-text">Premium</span>
            </button>
          </div>

          <div class="messenger-section">
            <div class="section-header">
              <h3>Thành viên</h3>
              <a href="#" id="btn-view-all-members">Xem tất cả</a>
            </div>
            <div class="messenger-row">
              <div class="avatar-with-status">
                <img
                  class="row-avatar"
                  src="https://vcdn1-giaitri.vnecdn.net/2026/01/08/james-nhom-cortis-tai-su-kien-dior-1767840271-1767840287-1767841187.jpg?w=460&h=0&q=100&dpr=2&fit=crop&s=3AqqCtG3qbDfymg-qNqUGA"
                  alt="Thành viên"
                />
                <span class="status-dot"></span>
              </div>
              <div class="row-info">
                <h4>chêm</h4>
                <span>Đang hoạt động</span>
              </div>
            </div>
            <div class="messenger-row">
              <div class="avatar-with-status">
                <img
                  class="row-avatar"
                  src="https://vtcpay.vn/blog/wp-content/uploads/2026/03/cortis-thanh-vien-03.webp"
                  alt="Thành viên"
                />
              </div>
              <div class="row-info">
                <h4>chu hun</h4>
                <span>Hoạt động 25 phút trước</span>
              </div>
            </div>
            <div class="messenger-row">
              <div class="avatar-with-status">
                <img
                  class="row-avatar"
                  src="https://vtcpay.vn/blog/wp-content/uploads/2026/03/cortis-thanh-vien-04.webp"
                  alt="Thành viên"
                />
                <span class="status-dot"></span>
              </div>
              <div class="row-info">
                <h4>sông hơi</h4>
                <span>Đang hoạt động</span>
              </div>
            </div>
          </div>

          <div class="messenger-section">
            <div class="section-header">
              <h3>Kết nối Mentor</h3>
              <a href="#" id="btn-view-all-mentors">Xem tất cả</a>
            </div>
            <div class="messenger-row">
              <div class="avatar-with-status">
                <img
                  class="row-avatar"
                  src="https://bloganchoi.com/wp-content/uploads/2025/08/profile-nhom-nhac-cortis-kpop-7-696x910.jpg"
                  alt="Mentor"
                />
                <span class="status-dot"></span>
              </div>
              <div class="row-info">
                <h4>kẹo con</h4>
                <span>nhảy nhảy</span>
              </div>
              <span class="row-action status-color">Online</span>
            </div>
            <button class="find-mentor-btn" id="btn-find-mentor">
              Tìm mentor phù hợp
            </button>
          </div>
        </div>

        <div id="sidebar-list-view" style="display: none">
          <div class="list-view-header">
            <svg id="btn-back-sidebar" viewBox="0 0 24 24">
              <path
                d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"
              />
            </svg>
            <h3 id="list-view-title">Danh sách</h3>
          </div>
          <div id="list-view-content" class="messenger-section"></div>
        </div>
      </div>
    </div>

    <script src="../../js/nav.js"></script>
    <script src="navc.js"></script>
  </body>
</html>
