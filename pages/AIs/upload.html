<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Upload + Read — Protocol</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="./ais.css" />
</head>
<body>

  <div id="site-nav"></div>

  <main class="ai-container">
    <div class="ai-page-header">
      <div>
        <h1>File Upload + Read</h1>
        <p class="ai-inline-note">Extract text from PDF/DOCX/TXT and prepare it for cloud upload.</p>
      </div>
      <div class="ai-links">
        <a class="btn btn-outline" href="index.html">AI Home</a>
        <a class="btn btn-outline" href="../../index.html">Site Home</a>
      </div>
    </div>

    <details class="ai-settings">
      <summary>API Settings</summary>
      <form id="upload-settings" class="ai-form">
        <div class="ai-field">
          <label class="ai-label" for="upload-sign">Upload signing endpoint</label>
          <input id="upload-sign" class="ai-input" data-setting="uploadSignEndpoint" placeholder="https://api.example.com/uploads/sign" />
          <div class="ai-inline-note">Used to request a pre-signed upload URL.</div>
        </div>
        <div class="ai-field">
          <label class="ai-label" for="upload-finalize">Upload finalize endpoint (optional)</label>
          <input id="upload-finalize" class="ai-input" data-setting="uploadFinalizeEndpoint" placeholder="https://api.example.com/uploads/finalize" />
        </div>
      </form>
    </details>

    <section class="ai-panel">
      <h2>File input</h2>
      <form id="upload-form" class="ai-form">
        <div class="ai-field">
          <label class="ai-label">Input type</label>
          <div class="ai-select-wrapper" data-select>
            <button class="ai-select-trigger" type="button" data-select-trigger aria-expanded="false">
              <span data-select-label></span>
              <span aria-hidden="true">▾</span>
            </button>
            <div class="ai-select-menu" data-select-menu>
              <button class="ai-select-option" type="button" data-value="file">File upload</button>
              <button class="ai-select-option" type="button" data-value="text">Paste text</button>
            </div>
            <select id="upload-input-type" class="ai-select-native" aria-hidden="true">
              <option value="file">File upload</option>
              <option value="text">Paste text</option>
            </select>
          </div>
        </div>
        <div class="ai-field ai-collapse" id="upload-file-section">
          <label class="ai-label" for="upload-file">Select file</label>
          <div class="ai-file-control">
            <input id="upload-file" class="ai-file-input" type="file" accept=".pdf,.docx,.txt" />
            <label class="btn btn-outline" for="upload-file">Choose file</label>
            <span id="upload-file-name" class="ai-file-name">No file selected</span>
          </div>
        </div>
        <div class="ai-field ai-collapse ai-hidden" id="upload-text-section">
          <label class="ai-label" for="upload-text">Paste text</label>
          <textarea id="upload-text" class="ai-textarea" placeholder="Paste text to upload as a .txt file..."></textarea>
        </div>
        <div class="ai-actions ai-upload-actions">
          <button class="btn btn-outline" type="button" id="upload-read">Read file</button>
          <button class="btn btn-primary" type="submit" id="upload-send">Upload to cloud</button>
        </div>
      </form>
      <div id="upload-status" class="ai-status ai-hidden"></div>
    </section>

    <section id="upload-preview-panel" class="ai-panel ai-result-panel is-hidden">
      <h2>Extracted text preview</h2>
      <div id="upload-preview" class="ai-output"></div>
    </section>

    <section id="upload-result-panel" class="ai-panel ai-result-panel is-hidden">
      <h2>Upload result</h2>
      <div id="upload-result" class="ai-output"></div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="./select-ui.js"></script>
  <script>
    (function () {
      const select = document.getElementById('upload-input-type');
      const fileSection = document.getElementById('upload-file-section');
      const textSection = document.getElementById('upload-text-section');
      const readButton = document.getElementById('upload-read');
      const fileInput = document.getElementById('upload-file');
      const fileName = document.getElementById('upload-file-name');
      const textInput = document.getElementById('upload-text');
      if (!select || !fileSection || !textSection || !readButton) {
        return;
      }
      const apply = () => {
        if (select.value === 'text') {
          fileSection.classList.add('ai-hidden');
          textSection.classList.remove('ai-hidden');
          readButton.textContent = 'Preview text';
          if (fileInput) {
            fileInput.value = '';
          }
          if (fileName) {
            fileName.textContent = 'No file selected';
          }
          return;
        }
        fileSection.classList.remove('ai-hidden');
        textSection.classList.add('ai-hidden');
        readButton.textContent = 'Read file';
        if (textInput) {
          textInput.value = '';
        }
      };
      select.addEventListener('change', apply);
      apply();
    })();
  </script>
  <script type="module" src="./upload.js"></script>

</body>
</html>
