<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plagiarism Check — Protocol</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="./ais.css" />
</head>
<body>

  <div id="site-nav"></div>

  <main class="ai-container">
    <div class="ai-page-header">
      <div>
        <h1>Plagiarism Check</h1>
        <p class="ai-inline-note">Submit text or upload a file for external plagiarism analysis.</p>
      </div>
      <div class="ai-links">
        <a class="btn btn-outline" href="index.html">AI Home</a>
        <a class="btn btn-outline" href="../../index.html">Site Home</a>
      </div>
    </div>

    <details class="ai-settings">
      <summary>API Settings</summary>
      <form id="plagiarism-settings" class="ai-form">
        <div class="ai-field">
          <label class="ai-label" for="plagiarism-endpoint">Plagiarism API endpoint</label>
          <input id="plagiarism-endpoint" class="ai-input" data-setting="plagiarismEndpoint" placeholder="https://api.example.com/plagiarism/check" />
        </div>
      </form>
    </details>

    <section class="ai-panel">
      <h2>Check content</h2>
      <form id="plagiarism-form" class="ai-form">
        <div class="ai-field">
          <label class="ai-label">Input type</label>
          <div class="ai-select-wrapper" data-select>
            <button class="ai-select-trigger" type="button" data-select-trigger aria-expanded="false">
              <span data-select-label></span>
              <span aria-hidden="true">▾</span>
            </button>
            <div class="ai-select-menu" data-select-menu>
              <button class="ai-select-option" type="button" data-value="text">Text input</button>
              <button class="ai-select-option" type="button" data-value="file">File upload</button>
            </div>
            <select id="plagiarism-input-type" class="ai-select-native" aria-hidden="true">
              <option value="text">Text input</option>
              <option value="file">File upload</option>
            </select>
          </div>
        </div>
        <div class="ai-field ai-collapse" id="plagiarism-text-section">
          <label class="ai-label" for="plagiarism-text">Text to check</label>
          <textarea id="plagiarism-text" class="ai-textarea" placeholder="Paste text here..."></textarea>
        </div>
        <div class="ai-field ai-collapse ai-hidden" id="plagiarism-file-section">
          <label class="ai-label" for="plagiarism-file">Upload a file (PDF, DOCX, TXT)</label>
          <div class="ai-file-control">
            <input id="plagiarism-file" class="ai-file-input" type="file" accept=".pdf,.docx,.txt" />
            <label class="btn btn-outline" for="plagiarism-file">Choose file</label>
            <span id="plagiarism-file-name" class="ai-file-name">No file selected</span>
          </div>
        </div>
        <div class="ai-actions">
          <button class="btn btn-primary" type="submit" id="plagiarism-submit">Run check</button>
        </div>
      </form>
    </section>

    <section class="ai-panel">
      <h2>Results</h2>
      <div id="plagiarism-status" class="ai-status">Awaiting input.</div>
      <div id="plagiarism-output" class="ai-output"></div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="./select-ui.js"></script>
  <script>
    (function () {
      const select = document.getElementById('plagiarism-input-type');
      const textSection = document.getElementById('plagiarism-text-section');
      const fileSection = document.getElementById('plagiarism-file-section');
      if (!select || !textSection || !fileSection) {
        return;
      }
      const apply = () => {
        if (select.value === 'file') {
          textSection.classList.add('ai-hidden');
          fileSection.classList.remove('ai-hidden');
        } else {
          textSection.classList.remove('ai-hidden');
          fileSection.classList.add('ai-hidden');
        }
      };
      select.addEventListener('change', apply);
      apply();
    })();
  </script>
  <script type="module" src="./plagiarism.js"></script>

</body>
</html>
