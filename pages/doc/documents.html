<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documents — Protocol</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/documents.css" />
</head>
<body>

  <div id="site-nav"></div>

  <div class="doc-root">
    <main class="documents-container">

      <a class="back-link" href="../../index.html">
        <i class="ti ti-arrow-left"></i> Trang chủ
      </a>

      <!-- Toolbar -->
      <div class="doc-toolbar">
        <div class="doc-toolbar-search">
          <input id="search-q" type="search" placeholder="Search documents…" autocomplete="off">
        </div>
        <select id="type-filter" onchange="handleFilter()">
          <option value="all">All Types</option>
          <option value="Research Paper">Research Paper</option>
          <option value="Thesis">Thesis</option>
          <option value="Article">Article</option>
          <option value="Report">Report</option>
          <option value="General">General</option>
        </select>
        <input id="date-filter" type="date" onchange="handleFilter()" title="Filter by upload date">
        <div class="view-toggle" role="group" aria-label="View mode">
          <button class="view-btn active" id="btn-view-list"  onclick="setView('list')"    title="List view">☰</button>
          <button class="view-btn"        id="btn-view-grid"  onclick="setView('grid')"    title="Grid view">⊞</button>
          <button class="view-btn"        id="btn-view-compact" onclick="setView('compact')" title="Compact grid">⊟</button>
        </div>
        <button class="btn btn-primary btn-upload-open" onclick="openUpload()">＋ Upload</button>
      </div>

      <!-- Document list -->
      <div class="list-card">
        <div class="list-header">
          <div class="list-title">Documents</div>
          <span class="count-pill" id="count-pill">0 documents</span>
        </div>
        <div id="doc-list"></div>
      </div>

    </main>
  </div>

  <!-- Upload Modal -->
  <div id="upload-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="upload-modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="upload-modal-title">Upload Document</h2>
        <button class="modal-close" onclick="closeUpload()" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="up-name">Document Title</label>
          <input id="up-name" type="text" placeholder="Enter document title…">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="up-type">Document Type</label>
            <select id="up-type">
              <option value="General">General</option>
              <option value="Research Paper">Research Paper</option>
              <option value="Thesis">Thesis</option>
              <option value="Article">Article</option>
              <option value="Report">Report</option>
            </select>
          </div>
          <div class="form-group">
            <label for="up-univ">University / Institution</label>
            <input id="up-univ" type="text" placeholder="e.g. VNU, MIT…">
          </div>
        </div>
        <div class="form-group">
          <label for="up-field">Field / Subject</label>
          <input id="up-field" type="text" placeholder="e.g. Computer Science, Marketing…">
        </div>
        <div class="form-group">
          <label for="up-description">Description <span style="font-weight:400;color:var(--clr-muted)">(optional)</span></label>
          <textarea id="up-description" rows="3" placeholder="Brief description of this document…" style="width:100%;resize:vertical;padding:8px;border:1px solid var(--clr-border);border-radius:6px;background:var(--clr-bg);color:var(--clr-text);font-size:0.9rem;font-family:inherit"></textarea>
        </div>
        <div class="form-group">
          <label>File</label>
          <div class="drop-zone" id="drop-zone"
            onclick="document.getElementById('file-real').click()"
            ondragover="event.preventDefault();this.classList.add('over')"
            ondragleave="this.classList.remove('over')"
            ondrop="handleDrop(event)">
            <span class="drop-icon">📤</span>
            <div class="drop-title">Click or drag &amp; drop</div>
            <div class="drop-sub">PDF, DOCX, TXT, SAV…</div>
            <div class="file-name-display" id="file-label"></div>
          </div>
          <input type="file" id="file-real" style="display:none" accept=".pdf,.docx,.doc,.txt,.sav,.spss,.xlsx,.csv" onchange="handleFile(this)">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeUpload()">Cancel</button>
        <button class="btn btn-primary" onclick="handleUploadSubmit()">Upload</button>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

<!-- Edit Document Modal -->
<div id="edit-doc-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Edit Document</h3>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-doc-id">
      <div class="form-group">
        <label for="edit-doc-name">Name</label>
        <input id="edit-doc-name" type="text">
      </div>
      <div class="form-group">
        <label for="edit-doc-type">Document Type</label>
        <select id="edit-doc-type">
          <option>General</option>
          <option>Research Paper</option>
          <option>Lecture Notes</option>
          <option>Lab Report</option>
          <option>Thesis</option>
          <option>Book</option>
          <option>Presentation</option>
        </select>
      </div>
      <div class="form-group">
        <label for="edit-doc-field">Field / Subject</label>
        <input id="edit-doc-field" type="text">
      </div>
      <div class="form-group">
        <label for="edit-doc-univ">University / Institution</label>
        <input id="edit-doc-univ" type="text">
      </div>
      <div class="form-group">
        <label for="edit-doc-description">Description</label>
        <textarea id="edit-doc-description" rows="3" style="width:100%;resize:vertical;padding:8px;border:1px solid var(--clr-border);border-radius:6px;background:var(--clr-bg);color:var(--clr-text);font-size:0.9rem;font-family:inherit"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitEditDoc()">Save Changes</button>
    </div>
  </div>
</div>

  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/documents.js"></script>
</body>
</html>
