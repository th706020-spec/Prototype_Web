<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forum — Protocol</title>
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="stylef.css" />
  </head>
  <body>
    <div id="site-nav"></div>

    <div class="forum-root">
      <a class="back-link" href="../../index.html">← Trang chủ</a>

      <div class="forum-hero">
        <div class="forum-hero-top">
          <div>
            <h2 class="forum-title">Cộng đồng Học tập</h2>
            <p class="forum-sub">Trao đổi dành riêng cho thành viên đã đăng ký</p>
          </div>
          <button id="btn-open-modal" class="btn btn-primary">+ Bài viết mới</button>
        </div>
        <div id="tags-container" class="forum-tags"></div>
      </div>

      <div id="posts-container"></div>
    </div>

    <!-- Create post modal -->
    <div id="create-modal" class="modal-overlay" style="display:none">
      <div class="modal-box">
        <button class="modal-close" id="btn-close-modal">✕</button>
        <h3 style="font-size:18px;font-weight:700;margin-bottom:20px;color:var(--clr-text)">Tạo bài viết mới</h3>
        <div class="auth-form">
          <div class="auth-field">
            <input type="text" id="post-title" class="auth-input" placeholder="Tiêu đề bài viết" />
          </div>
          <div class="auth-field">
            <textarea id="post-content" class="auth-input" placeholder="Nội dung chia sẻ..." rows="5" style="resize:vertical;min-height:120px"></textarea>
          </div>
          <div class="auth-field">
            <input type="text" id="post-tags" class="auth-input" placeholder="Tags (phân cách bởi dấu phẩy): Hỏi đáp, Tips..." />
          </div>
          <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px">
            <button id="btn-cancel-modal" class="btn btn-outline">Hủy</button>
            <button id="btn-submit-post" class="btn btn-primary">Đăng bài</button>
          </div>
        </div>
      </div>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/nav.js"></script>
    <script src="navf.js"></script>
  </body>
</html>
